<head>

  <title>パチスロ収支表</title>
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body class="navy-ui">

  <style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
  }

  #splashScreen {
    position: fixed; inset: 0;
    background: #000; overflow: hidden;
    z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  }

  /* ── Cinematic letterbox ── */
  .bar-top, .bar-bottom {
    position: absolute; left: 0; width: 100%;
    background: #000; z-index: 200;
  }
  .bar-top    { top: 0;    height: max(env(safe-area-inset-top),  20px); }
  .bar-bottom { bottom: 0; height: max(env(safe-area-inset-bottom), 20px); }

  /* ── Background glow ── */
  .bg-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 65% 55% at 50% 47%,
      #0c1a52 0%, #070f2e 40%, #000 100%);
    opacity: 0;
    animation: bgFade .7s ease-out .3s forwards;
  }
  @keyframes bgFade { to { opacity: 1; } }

  /* ── Canvas layers ── */
  #curtainCanvas, #streaksCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; opacity: 0;
  }
  #curtainCanvas { animation: cAnim 4s ease-out forwards; }
  #streaksCanvas { animation: sAnim 4s ease-out forwards; }

  @keyframes cAnim {
    0%  { opacity: 0; } 12% { opacity: .04; }
    38% { opacity: 1; } 62% { opacity: .55; } 100% { opacity: .22; }
  }
  @keyframes sAnim {
    0%  { opacity: 0; } 18% { opacity: .15; }
    42% { opacity: 1; } 68% { opacity: .38; } 100% { opacity: .12; }
  }

  /* ── Horizontal flares ── */
  .flare-core, .flare-soft {
    position: absolute; left: 0; width: 100%;
    pointer-events: none; top: 50%;
    opacity: 0; animation: flareA 4s ease-out forwards;
  }
  .flare-core {
    height: 2px; margin-top: -24px;
    background: linear-gradient(to right,
      transparent 0%, rgba(80,130,255,0) 8%,
      rgba(150,190,255,.8) 38%, rgba(200,220,255,1) 50%,
      rgba(150,190,255,.8) 62%, rgba(80,130,255,0) 92%, transparent 100%);
    filter: blur(.4px);
  }
  .flare-soft {
    height: 18px; margin-top: -33px;
    background: linear-gradient(to right,
      transparent 0%, rgba(40,80,200,0) 12%,
      rgba(65,115,240,.25) 38%, rgba(90,148,255,.4) 50%,
      rgba(65,115,240,.25) 62%, rgba(40,80,200,0) 88%, transparent 100%);
    filter: blur(5px);
  }
  @keyframes flareA {
    0%,22% { opacity: 0; } 40% { opacity: 1; }
    58%    { opacity: .48; } 100% { opacity: .08; }
  }

  /* ════════════ LOGO ════════════ */
  .logo-wrap {
    position: absolute; width: 100%;
    top: 50%; transform: translateY(calc(-50% - 20px));
    text-align: center; z-index: 60;
  }

  /* EN eyebrow */
  .en-label {
    display: block; font-size: 10px; font-weight: 400;
    letter-spacing: .52em; text-indent: .52em;
    color: transparent; margin-bottom: 12px;
    animation: enA .8s ease-out .6s forwards;
  }
  @keyframes enA { to { color: rgba(110,155,245,.55); } }

  /* ── Title block ── */
  .title-block {
    position: relative; display: inline-block;
  }

  /* Blur glow layer */
  .title-glow {
    position: absolute; inset: 0;
    font-size: 80px; font-weight: 900;
    letter-spacing: .07em; line-height: 1;
    text-align: center;
    color: rgba(100,158,255,.75);
    filter: blur(24px);
    pointer-events: none; user-select: none;
    animation: tGlowA 4s ease-out forwards;
  }
  @keyframes tGlowA {
    0%  { opacity: 0; } 18% { opacity: .08; }
    42% { opacity: .9; } 63% { opacity: .6; } 100% { opacity: .42; }
  }

  /* Metallic gradient text */
  .title {
    display: block; position: relative;
    font-size: 80px; font-weight: 900;
    letter-spacing: .07em; line-height: 1;
    padding: 0 6px;
    background: linear-gradient(
      168deg,
      #c2d8ff 0%, #ffffff 16%,
      #dce8ff 32%, #f8fbff 50%,
      #a8c0ef 66%, #6890d8 82%, #4a6db8 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleA 4s ease-out forwards;
  }
  @keyframes titleA {
    0%   { filter: brightness(.03) blur(4px);   opacity: .5; }
    20%  { filter: brightness(.08) blur(2.5px); opacity: .65; }
    44%  { filter: brightness(.38) blur(1px);   opacity: .78; }
    64%  { filter: brightness(1.18) blur(0px);  opacity: 1; }
    100% { filter: brightness(1.02) blur(0px);  opacity: 1; }
  }

  /* Crisp stroke outline */
  .title-outline {
    position: absolute; inset: 0;
    font-size: 80px; font-weight: 900;
    letter-spacing: .07em; line-height: 1;
    text-align: center;
    color: transparent;
    -webkit-text-stroke: .8px rgba(170,205,255,.22);
    pointer-events: none;
    animation: outA 4s ease-out forwards;
  }
  @keyframes outA { 0%,60% { opacity: 0; } 100% { opacity: 1; } }

  /* ── Divider ── */
  .divider {
    display: block; height: 1px; width: 0;
    background: linear-gradient(to right,
      transparent,
      rgba(100,148,255,.45) 18%, rgba(195,218,255,.95) 50%,
      rgba(100,148,255,.45) 82%, transparent);
    margin: 18px auto 0;
    animation: divA .8s cubic-bezier(.22,1,.36,1) 2.3s forwards;
  }
  @keyframes divA { to { width: 250px; } }

  .div-diamonds {
    display: flex; justify-content: center;
    align-items: center; gap: 244px;
    margin-top: -4.5px; opacity: 0;
    animation: ddA .35s ease-out 3.05s forwards;
  }
  .div-diamonds span {
    display: block; width: 4px; height: 4px;
    background: rgba(160,200,255,.8); transform: rotate(45deg);
  }
  @keyframes ddA { to { opacity: 1; } }

  /* ── Subtitle ── */
  .subtitle {
    display: block; font-size: 24px; font-weight: 700;
    letter-spacing: .26em; text-indent: .26em;
    color: transparent; margin-top: 14px;
    animation: subA .95s ease-out 2.45s forwards;
  }
  @keyframes subA {
    to { color: rgba(175,205,255,.94);
         text-shadow: 0 0 24px rgba(80,130,255,.30); }
  }

  /* ── Tagline ── */
  .tagline-wrap {
    display: block; margin-top: 28px;
    opacity: 0; animation: tagWrapA .9s ease-out 3.05s forwards;
  }
  @keyframes tagWrapA { to { opacity: 1; } }

  .tagline-rule {
    display: flex; align-items: center;
    justify-content: center; gap: 10px; margin-bottom: 12px;
  }
  .tagline-rule::before,
  .tagline-rule::after {
    content: ''; display: block; height: 1px; width: 38px;
    background: rgba(130,175,255,.45);
  }
  .rule-diamond {
    width: 4px; height: 4px;
    background: rgba(170,210,255,.80); transform: rotate(45deg);
  }

  .tagline {
    display: block;
    font-size: 15.5px;
    font-weight: 500;
    letter-spacing: .20em;
    text-indent: .20em;
    color: rgba(228, 238, 255, 0.97);
    text-shadow:
      0 0  10px rgba(110, 158, 255, .70),
      0 0  28px rgba(65,  105, 240, .38),
      0 1px  8px rgba(  0,   0,   0, .98);
  }

  /* ── Vignette ── */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 84% at 50% 50%,
      transparent 22%, rgba(0,0,0,.42) 65%, rgba(0,0,0,.92) 100%);
    pointer-events: none; z-index: 40;
  }

  /* ── Scan lines ── */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 3px,
      rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
    pointer-events: none; z-index: 45; opacity: .6;
  }
